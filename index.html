<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMENEZS Frequency Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--s1:#141414;--s2:#1e1e1e;
  --gold:#c8a96e;--gold2:#2e2010;
  --teal:#6ec8b0;--teal2:#0a1e18;
  --lav:#9e8ec8;--lav2:#16122a;
  --txt:#e0ddd6;--txt2:#888880;--txt3:#3a3a38;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);
}
body{background:var(--bg);color:var(--txt);font-family:sans-serif;min-height:100vh}
#app{max-width:420px;margin:0 auto;padding:20px 16px 60px}
.logo{font-family:monospace;font-size:9px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:20px;opacity:.7}
.prog{display:flex;gap:4px;margin-bottom:20px}
.pdot{height:4px;flex:1;border-radius:2px;background:#222;transition:background .3s}
.pdot.done,.pdot.cur{background:var(--gold)}
.slbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.18em;margin-bottom:8px;font-family:monospace}
.sq{font-size:20px;font-weight:500;color:var(--txt);line-height:1.35;margin-bottom:6px}
.ssub{font-size:13px;color:var(--txt2);margin-bottom:20px;line-height:1.5}
.og{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.op{background:var(--s1);border:1.5px solid var(--b2);border-radius:10px;padding:14px 10px;cursor:pointer;transition:all .15s;text-align:center}
.op:hover,.op.on{border-color:var(--gold);background:var(--gold2)}
.oi{font-size:22px;margin-bottom:6px}
.ol{font-size:13px;font-weight:500;color:var(--txt)}
.os{font-size:11px;color:var(--txt2);margin-top:2px}
.inp{width:100%;background:var(--s1);border:1.5px solid var(--b2);color:var(--txt);padding:12px 14px;font-size:14px;border-radius:10px;outline:none;margin-bottom:10px}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--txt3)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:28px}
.tag{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--gold2);color:var(--gold);border:1px solid var(--gold);cursor:pointer}
.sugs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.sug{font-size:10px;padding:4px 9px;border-radius:16px;border:1px solid var(--b2);color:var(--txt2);cursor:pointer;background:var(--s1);transition:all .12s}
.sug:hover,.sug.on{background:var(--gold2);color:var(--gold);border-color:var(--gold)}
.era-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.ep{font-size:10px;padding:7px 13px;border-radius:20px;border:1.5px solid var(--b2);color:var(--txt2);cursor:pointer;background:var(--s1);font-family:monospace;transition:all .12s}
.ep.on{background:var(--gold2);color:var(--gold);border-color:var(--gold)}
.cta{width:100%;padding:15px;border-radius:12px;background:var(--gold);color:#080808;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:8px;transition:opacity .15s;letter-spacing:.03em}
.cta:disabled{opacity:.25;cursor:default}
.cta:hover:not(:disabled){opacity:.87}
.back{background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer;padding:8px 0;margin-bottom:12px;display:block}
.back:hover{color:var(--txt)}
.sum-card{background:var(--s1);border:0.5px solid var(--b2);border-radius:12px;padding:16px;margin-bottom:16px}
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid var(--b1)}
.sum-row:last-child{border:none}
.sum-lbl{font-size:11px;color:var(--txt3);font-family:monospace;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0;margin-right:10px}
.sum-val{font-size:12px;color:var(--txt);font-weight:500;text-align:right}
.fire-box{background:var(--lav2);border-left:2px solid var(--lav);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:16px}
.fire-box p{font-size:12px;color:#c0b8e8;line-height:1.65}
.loading{padding:40px 0;text-align:center}
.spinner{width:36px;height:36px;border:2px solid var(--b2);border-top:2px solid var(--gold);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:13px;color:var(--txt2)}
.loading small{font-size:11px;color:var(--txt3);margin-top:5px;display:block}
.rhead{text-align:center;padding:12px 0 18px}
.rav{width:52px;height:52px;border-radius:50%;background:var(--gold2);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:17px;margin:0 auto 9px;font-family:monospace;font-weight:700;color:var(--gold)}
.rname{font-size:17px;font-weight:500;color:var(--txt);margin-bottom:2px}
.rmeta{font-size:12px;color:var(--txt2)}
.rlineup{font-size:11px;color:var(--txt3);margin-top:4px;font-family:monospace}
.badges{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:10px 0 14px}
.badge{font-size:9px;padding:3px 9px;border-radius:20px;font-family:monospace;text-transform:uppercase;letter-spacing:.1em}
.bg{background:var(--gold2);color:var(--gold)}
.bt{background:var(--teal2);color:var(--teal)}
.bl{background:var(--lav2);color:var(--lav)}
.note-box{background:var(--lav2);border-left:2px solid var(--lav);border-radius:0 8px 8px 0;padding:11px 14px;margin-bottom:10px}
.note-box p{font-size:12px;color:#c0b8e8;line-height:1.7}
.alert-box{background:#1c1200;border-left:2px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:14px}
.alert-box p{font-size:12px;color:#c8a06e;line-height:1.65}
.section-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.18em;margin:14px 0 8px;font-family:monospace}
.tc{background:var(--s1);border:0.5px solid var(--b1);border-radius:10px;padding:11px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
.tn{font-size:10px;color:var(--txt3);min-width:18px;text-align:right;font-family:monospace;padding-top:2px;flex-shrink:0}
.ti{flex:1;min-width:0}
.tt{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ta{font-size:11px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.tl{font-size:10px;color:var(--txt3);margin-top:1px}
.tw{font-size:10px;color:var(--txt3);margin-top:4px;line-height:1.4}
.tr2{text-align:right;flex-shrink:0}
.tf{font-size:8px;padding:2px 6px;border-radius:2px;font-family:monospace}
.ty{font-size:10px;color:var(--txt3);margin-top:3px}
.prog-box{background:var(--s1);border-radius:10px;padding:13px 14px}
.prog-box p{font-size:12px;color:var(--txt2);line-height:1.75}
.divider{height:0.5px;background:var(--b1);margin:16px 0}
.more-btn{width:100%;padding:12px;border-radius:10px;background:none;border:1.5px solid var(--b2);color:var(--txt2);font-size:13px;cursor:pointer;transition:all .15s;margin-top:8px}
.more-btn:hover{border-color:var(--gold);color:var(--gold)}
.error-box{background:#1a0f0f;border-left:2px solid #c86e6e;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:14px}
.error-box p{font-size:12px;color:#c89e9e;line-height:1.6}
</style>
</head>
<body>
<div id="app">
  <div class="logo">FMENEZS ◆ Frequency Intelligence</div>
  <div id="root"></div>
</div>
<script>
const FC={"Organic Emotional":{bg:"#0f1f14",fg:"#8ec8a0"},"Dreamy Progressive":{bg:"#14102a",fg:"#9e8ec8"},"Progressive Warm":{bg:"#0f1520",fg:"#6e90c8"},"Afro Groove":{bg:"#1f100f",fg:"#c8906e"},"Indie Melodic":{bg:"#10202a",fg:"#6ec8c0"},"Deep Storytelling":{bg:"#101520",fg:"#6eb4c8"},"Spiritual Organic":{bg:"#0f1a1a",fg:"#7ec8b8"},"Hypnotic Raw":{bg:"#20101f",fg:"#c06ec8"},"Peak Raw":{bg:"#1f1010",fg:"#c86e6e"},"Groove Minimal":{bg:"#181818",fg:"#aaaaaa"},"Winehouse":{bg:"#2a1f10",fg:"#c8a06e"}};
const STEPS=[{id:'name',type:'input',lbl:'Passo 1 de 6',q:'Qual é o seu nome artístico?',sub:'Como você quer ser chamado nessa sessão.',ph:'Ex: FMENEZS, DJ Aisha, Rawko...'},{id:'lineup',type:'tags',lbl:'Passo 2 de 6',q:'Quem toca no lineup?',sub:'Coloque os headliners. Você toca antes deles.'},{id:'slot',type:'opts',lbl:'Passo 3 de 6',q:'Qual é o seu slot?',sub:'Onde você entra na noite.',opts:[{v:'abertura',i:'◎',l:'Abertura',s:'Primeiro da noite'},{v:'warmup',i:'◑',l:'Warm-up',s:'Antes do headliner'},{v:'sunset',i:'◐',l:'Sunset',s:'Pôr do sol'},{v:'closing',i:'●',l:'Closing',s:'Encerramento'}]},{id:'period',type:'opts',lbl:'Passo 4 de 6',q:'Dia ou noite?',sub:'Muda tudo: energia, textura, velocidade.',opts:[{v:'noite',i:'◉',l:'Noite',s:'22h — 06h'},{v:'dia',i:'◎',l:'Dia',s:'Até as 20h'},{v:'virada',i:'◑',l:'Virada',s:'00h — 03h'}]},{id:'venue',type:'opts',lbl:'Passo 5 de 6',q:'Onde vai rolar?',sub:'O espaço define a estética.',opts:[{v:'club',i:'▣',l:'Club',s:'Ambiente fechado'},{v:'festival',i:'◻',l:'Festival',s:'Multi-palcos'},{v:'openair',i:'◯',l:'Open Air',s:'Ao ar livre'},{v:'praia',i:'◎',l:'Praia / Piscina',s:'Sunset vibes'}]},{id:'era',type:'era',lbl:'Passo 6 de 6',q:'Qual era musical te define?',sub:'Filtra as recomendações por período de lançamento.'}];
let A={},step=0,era='5y',loading=false,result=null;
function ini(){return(A.name||'DJ').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function render(){const r=document.getElementById('root');if(loading){r.innerHTML=renderLoading();return;}if(result){r.innerHTML=renderResult();return;}if(step>=STEPS.length){r.innerHTML=renderReview();return;}r.innerHTML=renderStep();}
function renderStep(){const s=STEPS[step];let h=`<div class="prog">${STEPS.map((_,i)=>`<div class="pdot${i<step?' done':i===step?' cur':''}"></div>`).join('')}</div>`;if(step>0)h+=`<button class="back" onclick="goBack()">← voltar</button>`;h+=`<div class="slbl">${s.lbl}</div><div class="sq">${s.q}</div><div class="ssub">${s.sub}</div>`;if(s.type==='input'){h+=`<input class="inp" id="ninp" placeholder="${s.ph}" value="${A[s.id]||''}" oninput="A['${s.id}']=this.value;recheck()">`;}if(s.type==='tags'){const tags=A.lineup||[];h+=`<div class="tags">${tags.map(t=>`<div class="tag" onclick="rmTag('${t}')">${t} ×</div>`).join('')}</div>`;h+=`<input class="inp" id="tinp" placeholder="Digite e pressione Enter..." onkeydown="addTag(event)">`;h+=`<div style="font-size:11px;color:var(--txt3);margin-bottom:8px">Sugestões:</div><div class="sugs">`;['Black Coffee','Guy J','Hernán Cattáneo','Solomun','Keinemusik','ANNA','Innellea','Nocapz','&ME','Nick Warren','Stephan Bodzin','Adam Port'].forEach(n=>{h+=`<div class="sug${(A.lineup||[]).includes(n)?' on':''}" onclick="addSug('${n}')">${n}</div>`;});h+=`</div>`;}if(s.type==='opts'){h+=`<div class="og">`;s.opts.forEach(o=>{h+=`<div class="op${A[s.id]===o.v?' on':''}" onclick="pickOpt('${s.id}','${o.v}')"><div class="oi">${o.i}</div><div class="ol">${o.l}</div><div class="os">${o.s}</div></div>`;});h+=`</div>`;}if(s.type==='era'){h+=`<div class="era-row">`;[['6m','Últimos 6 meses'],['5y','Últimos 5 anos'],['10y','Até 10 anos'],['vintage','Clássicos vintage']].forEach(([v,l])=>{h+=`<div class="ep${era===v?' on':''}" onclick="setEra('${v}')">${l}</div>`;});h+=`</div><div style="font-size:12px;color:var(--txt2);margin-bottom:16px;line-height:1.6">Vintage (anos 80–2000) cria identidade única. Lançamentos recentes mostram que você pesquisa.</div>`;}const ok=canGo();h+=`<button class="cta" id="ctabtn" ${ok?'':'disabled'} onclick="nextStep()">${step===STEPS.length-1?'Revisar →':'Continuar →'}</button>`;return h;}
function renderReview(){const eraLbl={'6m':'últimos 6 meses','5y':'últimos 5 anos','10y':'até 10 anos','vintage':'clássicos vintage'};const slotMap={abertura:'Abertura',warmup:'Warm-up',sunset:'Sunset',closing:'Closing'};const venueMap={club:'Club fechado',festival:'Festival',openair:'Open Air',praia:'Praia / Piscina'};let h=`<div class="prog">${STEPS.map(()=>`<div class="pdot done"></div>`).join('')}</div>`;h+=`<button class="back" onclick="goBack()">← editar</button>`;h+=`<div class="slbl">Revisão</div><div class="sq">Tudo certo?</div><div class="ssub">O Frequency Intelligence vai analisar seu perfil e montar a curadoria.</div>`;h+=`<div class="sum-card"><div class="sum-row"><div class="sum-lbl">Nome</div><div class="sum-val">${A.name||'—'}</div></div><div class="sum-row"><div class="sum-lbl">Lineup</div><div class="sum-val">${(A.lineup||[]).join(', ')||'—'}</div></div><div class="sum-row"><div class="sum-lbl">Slot</div><div class="sum-val">${slotMap[A.slot]||'—'}</div></div><div class="sum-row"><div class="sum-lbl">Período</div><div class="sum-val">${A.period||'—'}</div></div><div class="sum-row"><div class="sum-lbl">Venue</div><div class="sum-val">${venueMap[A.venue]||'—'}</div></div><div class="sum-row"><div class="sum-lbl">Era</div><div class="sum-val">${eraLbl[era]}</div></div></div>`;h+=`<div class="fire-box"><p>O Frequency Intelligence vai analisar o lineup, o contexto e o momento — e entregar 12 tracks com BPM range, estratégia curatorial e progressão energética.</p></div>`;h+=`<button class="cta" onclick="generate()">Analisar e montar set ↗</button><button class="back" style="margin-top:10px;text-align:center;width:100%" onclick="restart()">Recomeçar</button>`;return h;}
function renderLoading(){return`<div class="loading"><div class="spinner"></div><p>Frequency Intelligence analisando...</p><small>Leitura de pista, contexto e curadoria em processo</small></div>`;}
function renderResult(){if(result.error){return`<div class="error-box"><p>${result.error}</p></div><button class="cta" onclick="generate()">Tentar novamente</button>`;}const r=result;const eraLbl={'6m':'6 meses','5y':'5 anos','10y':'10 anos','vintage':'vintage'};let h=`<div class="rhead"><div class="rav">${ini()}</div><div class="rname">${A.name||'DJ'}</div><div class="rmeta">${A.slot||''} · ${A.venue||''} · ${A.period||''}</div><div class="rlineup">${(A.lineup||[]).join(' · ')}</div></div>`;h+=`<div class="badges"><div class="badge bg">${r.bpm_range||'—'}</div><div class="badge bt">era: ${eraLbl[era]}</div><div class="badge bl">Frequency Intelligence</div></div>`;if(r.curatorial_note)h+=`<div class="note-box"><p>${r.curatorial_note}</p></div>`;if(r.alerts&&r.alerts.length)h+=`<div class="alert-box"><p>${r.alerts.join('<br>')}</p></div>`;h+=`<div class="section-lbl">${(r.tracks||[]).length} tracks · ordem de execução</div>`;(r.tracks||[]).forEach((t,i)=>{const fc=FC[t.family]||{bg:'#181818',fg:'#aaa'};h+=`<div class="tc"><div class="tn">${i+1}</div><div class="ti"><div class="tt">${t.title||'—'}</div><div class="ta">${t.artist||'—'}</div><div class="tl">${t.label||''}</div><div class="tw">${t.why||''}</div></div><div class="tr2"><div class="tf" style="background:${fc.bg};color:${fc.fg}">${(t.family||'').split(' ')[0]}</div><div class="ty">${t.year||''}</div></div></div>`;});if(r.progression){h+=`<div class="section-lbl">Progressão energética</div><div class="prog-box"><p>${r.progression}</p></div>`;}h+=`<div class="divider"></div><button class="more-btn" onclick="generate()">Nova análise</button><button class="more-btn" style="margin-top:6px" onclick="restart()">Novo set</button>`;return h;}
async function generate(){loading=true;result=null;render();const eraMap={'6m':'lançamentos dos últimos 6 meses (2024–2026)','5y':'lançamentos dos últimos 5 anos (2021–2026)','10y':'até 10 anos atrás (2016–2026)','vintage':'clássicos underground de 1985–2010'};const slotMap={abertura:'Abertura (primeiro da noite)',warmup:'Warm-up principal (antes do headliner)',sunset:'Sunset (pôr do sol)',closing:'Closing (encerramento)'};const venueMap={club:'Club fechado',festival:'Festival',openair:'Open Air',praia:'Praia / Piscina'};const lineup=(A.lineup||[]).join(', ')||'não informado';const prompt=`Você é FMENEZS, DJ e curador musical especialista em warm-up de música eletrônica underground. Estamos em maio de 2026.\n\nPERFIL DO DJ:\n- Nome artístico: ${A.name}\n- Lineup / headliners: ${lineup}\n- Slot: ${slotMap[A.slot]}\n- Período: ${A.period}\n- Venue: ${venueMap[A.venue]}\n- Era musical: ${eraMap[era]}\n\nResponda APENAS em JSON válido, sem markdown, sem texto fora do JSON:\n{"bpm_range":"ex: 116–122 BPM","curatorial_note":"2-3 frases como curador humano","alerts":["alerta 1","alerta 2"],"tracks":[{"artist":"Nome","title":"Título","label":"Selo","year":2025,"family":"Família Sonora","bpm":118,"why":"1 frase"}],"progression":"2-3 frases narrativa energética"}\n\nFamílias: Winehouse, Organic Emotional, Afro Groove, Progressive Warm, Dreamy Progressive, Indie Melodic, Hypnotic Raw, Peak Raw, Groove Minimal, Deep Storytelling, Spiritual Organic.\n\nGere exatamente 12 tracks REAIS ordenadas para execução. Underground. Sem comerciais óbvios. Era: ${eraMap[era]}.`;try{const resp=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});const data=await resp.json();if(!resp.ok||data.error)throw new Error(data.error||'Erro');const clean=data.result.replace(/```json|```/g,'').trim();result=JSON.parse(clean);}catch(e){result={error:`Erro ao processar: ${e.message}`};}loading=false;render();}
function canGo(){const s=STEPS[step];if(s.type==='opts')return!!A[s.id];if(s.type==='tags')return!!(A.lineup&&A.lineup.length);if(s.type==='input')return!!(A[s.id]&&A[s.id].trim());return true;}
function goBack(){if(step>0){step--;render();}}
function nextStep(){if(canGo()){step++;render();}}
function pickOpt(id,v){A[id]=v;setTimeout(()=>{step++;render();},200);}
function setEra(v){era=v;render();}
function recheck(){const b=document.getElementById('ctabtn');if(b)b.disabled=!canGo();}
function addTag(e){if(e.key==='Enter'){const inp=document.getElementById('tinp');const v=inp.value.trim();if(v){A.lineup=A.lineup||[];if(!A.lineup.includes(v))A.lineup.push(v);inp.value='';render();}}}
function addSug(v){A.lineup=A.lineup||[];if(!A.lineup.includes(v))A.lineup.push(v);else A.lineup=A.lineup.filter(x=>x!==v);render();}
function rmTag(v){A.lineup=(A.lineup||[]).filter(x=>x!==v);render();}
function restart(){A={};step=0;era='5y';loading=false;result=null;render();}
render();
</script>
</body>
</html>
